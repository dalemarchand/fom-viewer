name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: latest_tag
        run: |
          # Fetch all tags first (including dangling ones)
          git fetch --tags origin
          # Get ALL tags sorted by version, pick the latest
          LATEST=$(git tag -l "v*" | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "semver=$LATEST" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: next_version
        run: |
          CURRENT="${{ steps.latest_tag.outputs.semver }}"
          CURRENT=${CURRENT#v}
          IFS='.' read -r major minor patch <<< "$CURRENT"
          PATCH=$((patch + 1))
          NEXT="v$major.$minor.$PATCH"
          echo "version=$NEXT" >> $GITHUB_OUTPUT

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update package.json version
        run: |
          VERSION="${{ steps.next_version.outputs.version }}"
          VERSION=${VERSION#v}
          npm pkg set version=$VERSION
          npm install --package-lock-only

      - name: Commit package.json version update
        run: |
          git add package.json package-lock.json
          git commit -m "Bump version to ${{ steps.next_version.outputs.version }}"

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Create annotated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.next_version.outputs.version }}" -m "Release ${{ steps.next_version.outputs.version }}"

      - name: Push tag
        run: git push origin "${{ steps.next_version.outputs.version }}"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_version.outputs.version }}
          name: Release ${{ steps.next_version.outputs.version }}
          draft: true
          prerelease: false
          body: FOM Viewer Release
          files: dist/fom-viewer.html